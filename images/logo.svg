<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <!-- Buildings silhouette -->
  <g transform="translate(0, 5)">
    <!-- Building 1 - tallest -->
    <rect x="28" y="8" width="22" height="82" fill="#2d2d2d" rx="1"/>
    <!-- Building 2 -->
    <rect x="52" y="20" width="18" height="70" fill="#3a3a3a" rx="1"/>
    <!-- Building 3 - medium -->
    <rect x="8" y="32" width="18" height="58" fill="#3a3a3a" rx="1"/>
    <!-- Building 4 - short -->
    <rect x="72" y="42" width="16" height="48" fill="#4a4a4a" rx="1"/>
    <!-- Building 5 - shortest -->
    <rect x="90" y="52" width="14" height="38" fill="#4a4a4a" rx="1"/>
    <!-- Window lines on tallest building -->
    <line x1="32" y1="16" x2="32" y2="88" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="38" y1="16" x2="38" y2="88" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="44" y1="16" x2="44" y2="88" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <!-- Window lines on building 2 -->
    <line x1="56" y1="26" x2="56" y2="88" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <line x1="62" y1="26" x2="62" y2="88" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Divider line -->
  <line x1="120" y1="15" x2="120" y2="85" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- Text: СОЮЗ -->
  <text x="138" y="55" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="#1d1d1f" letter-spacing="2">СОЮЗ</text>
  <!-- Text: недвижимость -->
  <text x="138" y="78" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#86868b" letter-spacing="1">недвижимость</text>
</svg>
