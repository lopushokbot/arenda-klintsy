<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Buildings group - 3D perspective style matching original -->
  <g>
    <!-- Building 1 - tallest, back-left -->
    <polygon points="52,8 78,8 78,90 52,90" fill="#2d2d2d"/>
    <polygon points="52,8 40,16 40,90 52,90" fill="#3d3d3d"/>

    <!-- Building 2 - tall, front-center -->
    <polygon points="62,12 92,12 92,90 62,90" fill="#1d1d1d"/>
    <polygon points="92,12 104,20 104,90 92,90" fill="#3a3a3a"/>
    <!-- Window lines on building 2 -->
    <line x1="70" y1="18" x2="70" y2="88" stroke="#fff" stroke-width="1.2" opacity="0.2"/>
    <line x1="78" y1="18" x2="78" y2="88" stroke="#fff" stroke-width="1.2" opacity="0.2"/>
    <line x1="86" y1="18" x2="86" y2="88" stroke="#fff" stroke-width="1.2" opacity="0.2"/>

    <!-- Building 3 - medium, left -->
    <polygon points="20,32 46,32 46,90 20,90" fill="#3a3a3a"/>
    <polygon points="20,32 10,38 10,90 20,90" fill="#4a4a4a"/>

    <!-- Building 4 - medium-short, right -->
    <polygon points="96,36 120,36 120,90 96,90" fill="#2d2d2d"/>
    <polygon points="120,36 130,42 130,90 120,90" fill="#4a4a4a"/>

    <!-- Building 5 - short, far right -->
    <polygon points="122,48 142,48 142,90 122,90" fill="#3d3d3d"/>
    <polygon points="142,48 150,54 150,90 142,90" fill="#505050"/>

    <!-- Building 6 - shortest, far left -->
    <polygon points="2,52 18,52 18,90 2,90" fill="#4a4a4a"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="170" y1="15" x2="170" y2="85" stroke="#2d2d2d" stroke-width="2"/>

  <!-- Text: СОЮЗ -->
  <text x="190" y="58" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="46" font-weight="900" fill="#1d1d1f" letter-spacing="2">СОЮЗ</text>

  <!-- Text: недвижимость -->
  <text x="190" y="82" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#888888" letter-spacing="2">недвижимость</text>
</svg>
